                    :root {
                        color-scheme: light;
                        --bg: #f4f4f4;
                        --bg-elevated: #fff;
                        --bg-soft: #f8f8f8;
                        --border: #d9d9d9;
                        --text: #161616;
                        --text-muted: #525252;
                        --accent: #0f62fe;
                        --accent-strong: #0043ce;
                        --hero-glow: radial-gradient(circle at 18% 10%, #dce7ff 0%, transparent 45%), radial-gradient(circle at 90% 0%, #d5ddff 0%, transparent 40%);
                        --shadow-soft: 0 10px 20px #1616160f;
                    }
                
                    @media (prefers-color-scheme: dark) {
                        :root {
                            color-scheme: dark;
                            --bg: #161616;
                            --bg-elevated: #262626;
                            --bg-soft: #1f1f1f;
                            --border: #525252;
                            --text: #f4f4f4;
                            --text-muted: #c6c6c6;
                            --accent: #78a9ff;
                            --accent-strong: #a6c8ff;
                            --hero-glow: radial-gradient(circle at 18% 10%, #003a6d 0%, transparent 45%), radial-gradient(circle at 90% 0%, #0043ce 0%, transparent 40%);

                        }
                    }
                
                    ::-webkit-scrollbar {
                        width: 5px;
                    }
                
                    ::-webkit-scrollbar-thumb {
                        background-color: #888;
                        border-radius: 0;
                    }
                
                    ::-webkit-scrollbar-thumb:hover {
                        background-color: #555;
                    }
                
                    * {
                        margin: 0;
                        padding: 0;
                        box-sizing: border-box;
                    }
                
                    html,
                    body {
                        min-height: 100%;
                    }
                
                    body {
                        font-family: "IBM Plex Sans", "Helvetica Neue", Helvetica, Tahoma, Arial, sans-serif;
                        line-height: 1.55;
                        font-size: 13px;
                        color: var(--text);
                        background-color: var(--bg);
                        background-image: var(--hero-glow);
                        background-repeat: no-repeat;
                        margin-bottom: 24px;
                    }
                
                    a {
                        color: var(--accent);
                        text-decoration: underline;
                    }
                
                    a:hover {
                        color: var(--accent-strong);
                        text-decoration: none;
                    }
                
                    #header {
                        background: color-mix(in srgb, var(--bg) 84%, transparent);
                        border-bottom: 1px solid var(--border);
                        backdrop-filter: blur(7px);
                        color: var(--text);
                        padding: 0 15px;
                        height: 60px;
                        display: flex;
                        align-items: center;
                        z-index: 100;
                    }
                
                    #header h1 {
                        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
                        font-size: 24px;
                        margin: 0 0 0 10px;
                        font-weight: 600;
                        color: var(--text) !important;
                        border-bottom: none !important;
                        padding-bottom: 0;
                    }
                
                    h1 {
                        color: var(--text);
                        margin-top: 0;
                        font-size: clamp(1.6rem, 2.8vw, 2.15rem);
                        font-weight: 700;
                        border-bottom: 1px solid var(--border);
                        padding-bottom: 8px;
                        margin-bottom: 16px;
                    }
                
                    p {
                        margin-bottom: 12px;
                    }
                
                    .error-page {
                        min-height: 100vh;
                        margin-bottom: 0;
                    }
                
                    .error-shell {
                        padding: 40px 20px;
                        display: flex;
                        justify-content: center;
                    }
                
                    .error-card {
                        background-color: var(--bg-elevated);
                        border: 1px solid var(--border);
                        max-width: 720px;
                        width: 100%;
                        padding: 28px;
                        box-shadow: var(--shadow-soft);
                    }
                
                    .error-card h1 {
                        margin-top: 0;
                        margin-bottom: 12px;
                    }
                
                    .error-footer {
                        margin-top: 24px;
                        border-top: 1px solid var(--border);
                        padding-top: 10px;
                        font-size: 11px;
                        color: var(--text-muted);
                    }
                </style>
