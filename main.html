<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Variações de Ícone</title>
<style>
  body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #fff; padding: 40px; display: flex; flex-wrap: wrap; gap: 40px; }
  .icon-container { text-align: center; }
  .title { margin-top: 15px; font-weight: 600; font-size: 14px; letter-spacing: 0.5px; }
  svg { filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
</style>
</head>
<body>

<script>
// Define as paletas respeitando o ciclo da geometria do seu logo original
const palettes = {
  "Main App (Original)": ["#00539C", "#6B9E1B", "#009B4D", "#F2C300"], // Azul, Verde Oliva, Verde Esmeralda, Amarelo
  "CLI": ["#2D3748", "#4A5568", "#A0AEC0", "#E2E8F0"],
  "FastCGI": ["#0A2540", "#1D4ED8", "#06B6D4", "#7DD3FC"],
  "Service": ["#312E81", "#4C1D95", "#0F766E", "#5EEAD4"],
  "TestSuite": ["#2563EB", "#16A34A", "#DC2626", "#D97706"],
  "MCP Server": ["#3B0764", "#8B5CF6", "#D946EF", "#F472B6"]
};

for (const [name, colors] of Object.entries(palettes)) {
  const [A, B, C, D] = colors;
  
  // A geometria exata:
  // Top Diamond: Top(A), Bottom(B)
  // Left Diamond: Top(B), Bottom(D)
  // Bottom Diamond: Top(D), Bottom(C)
  // Right Diamond: Top(C), Bottom(A)
  
  const svg = `
    <div class="icon-container">
      <svg viewBox="0 0 100 100" width="120" height="120">
        <polygon points="50,6 68,24 32,24" fill="${A}" />
        <polygon points="32,24 68,24 50,42" fill="${B}" />
        
        <polygon points="24,32 42,50 6,50" fill="${B}" />
        <polygon points="6,50 42,50 24,68" fill="${D}" />
        
        <polygon points="50,58 68,76 32,76" fill="${D}" />
        <polygon points="32,76 68,76 50,94" fill="${C}" />
        
        <polygon points="76,32 94,50 58,50" fill="${C}" />
        <polygon points="58,50 94,50 76,68" fill="${A}" />
      </svg>
      <div class="title">${name}</div>
    </div>
  `;
  document.write(svg);
}
</script>

</body>
</html>
