# Usage:
#   docker compose up            # Start in foreground
#   docker compose up -d         # Start in background
#   docker compose restart       # Restart (rebuilds binary from mounted source)
#   docker compose down          # Stop and remove containers
#   docker compose logs -f       # Follow logs

services:
  axonasp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axonasp
    ports:
      - "8801:8801"
      - "8000:8000"
      - "9000:9000"
    volumes:
      # Bind-mount source for Go rebuilds on restart
      - .:/app
      - ./www:/opt/axonasp/www
      - ./temp:/opt/axonasp/temp
      # Exclude generated artifacts from the bind-mount overlay
      - /app/temp
    environment:
      # Development overrides (take precedence over .env)
      VIPER_WATCH_CONFIG: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8801/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s